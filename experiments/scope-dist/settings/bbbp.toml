[experiment]
study_name = "bbbp"
sample_sizes = [20, 17, 15, 10, 8, 5, 3,]
random_seed = 42

[optimization.scope]
test_size = 0.7
n_splits = 5
metric = "balanced_accuracy"

[optimization.meta]
n_splits = 5
n_iter = 100
metric = "balanced_accuracy"
test_size = 0.7

[dataset]
min_length = 30
file_path = "data/BBBP.csv"
smiles_column = "smiles"
label_column = ["p_np"]

[paths]
results_path = "results"
